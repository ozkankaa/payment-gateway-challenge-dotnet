name: CI/CD - Kubernetes Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: './src/PaymentGateway.Api/PaymentGateway.Api.csproj'
  IMAGE_NAME: payment-gateway-api
  K8S_NAMESPACE: payment-gateway

jobs:
  build-test:
    name: Build, Unit Test, Integration Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Start integration dependencies
        run: docker compose -f docker-compose.integration.yml up -d

      - name: Wait for RabbitMQ
        run: |
          for i in {1..30}; do
            docker exec payment-rabbitmq rabbitmq-diagnostics check_running && exit 0
            sleep 2
          done
          docker logs payment-rabbitmq
          exit 1

      - name: Run tests
        env:
          ASPNETCORE_ENVIRONMENT: IntegrationTest
          ConnectionStrings__PaymentDb: "Data Source=payment-gateway-ci.db"

          RabbitMq__HostName: "localhost"
          RabbitMq__Port: "5672"
          RabbitMq__UserName: "guest"
          RabbitMq__Password: "guest"
          RabbitMq__VirtualHost: "/"
          RabbitMq__ExchangeName: "payment-domain-events"
          RabbitMq__QueueName: "payment-domain-events-queue"
          RabbitMq__RoutingKey: "payment.domain-event"
          RabbitMq__PrefetchCount: "10"

          AcquiringBank__BaseUrl: "http://localhost:8080"
          FraudService__BaseUrl: "http://localhost:8086"

          Service__Environment: "integration-test"
          Service__OpenTelemetry__OtlpEndpoint: "http://localhost:4318"
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Stop integration dependencies
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/prod/namespace.yaml
          kubectl apply -f k8s/prod/configmap.yaml
          kubectl apply -f k8s/prod/secret.yaml
          kubectl apply -f k8s/prod/service.yaml
          kubectl apply -f k8s/prod/deployment.yaml
          kubectl apply -f k8s/prod/hpa.yaml
          kubectl apply -f k8s/prod/pdb.yaml
          kubectl apply -f k8s/prod/ingress.yaml
          kubectl apply -f k8s/prod/istio-gateway.yaml
          kubectl apply -f k8s/prod/istio-virtualservice.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/payment-gateway-api \
            payment-gateway-api=${{ needs.docker-build-push.outputs.image }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/payment-gateway-api \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s