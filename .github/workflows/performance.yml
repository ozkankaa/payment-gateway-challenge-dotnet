name: Performance tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Which test to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
          - soak

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      influxdb:
        image: influxdb:1.8
        env:
          INFLUXDB_DB: k6
          INFLUXDB_HTTP_AUTH_ENABLED: "false"
        ports:
          - 8086:8086

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start integration dependencies
        run: |
          docker compose -f docker-compose.integration.yml up -d

      - name: Build API
        run: dotnet build src/PaymentGateway.Api --configuration Release

      - name: Start API in background
        run: |
          dotnet run \
            --project src/PaymentGateway.Api \
            --configuration Release \
            --urls http://localhost:5000 &

          echo "Waiting for API to be ready..."

          for i in {1..30}; do
            if curl -sf http://localhost:5000/health; then
              echo "API is up!"
              exit 0
            fi

            echo "Attempt $i - not ready yet, waiting 2s..."
            sleep 2
          done

          echo "API did not start in time"
          exit 1

      - name: Install K6
        uses: grafana/setup-k6-action@v1

      - name: Run selected performance test
        run: |
          k6 run \
            --out influxdb=http://localhost:8086/k6 \
            -e BASE_URL=http://localhost:5000 \
            test/performance/k6/scenarios/${{ github.event.inputs.test_type }}.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-results
          path: test-results/
          retention-days: 30

      - name: Stop integration dependencies
        if: always()
        run: |
          docker compose -f docker-compose.integration.yml down -v