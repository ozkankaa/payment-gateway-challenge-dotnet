# .github/workflows/performance.yml

name: Performance tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # allows manual trigger
    inputs:
      test_type:
        description: 'Which test to run'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, load, stress, spike, soak]

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      influxdb:
        image: influxdb:1.8
        env:
          INFLUXDB_DB: k6
          INFLUXDB_HTTP_AUTH_ENABLED: "false"
        ports:
          - 8086:8086

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build API
        run: dotnet build src/PaymentGateway.Api --configuration Release

      - name: Start API in background
        run: |
          dotnet run \
            --project src/PaymentGateway.Api \
            --configuration Release \
            --urls http://localhost:5000 &
          # Wait for API to be ready
          for i in {1..30}; do
            curl -sf http://localhost:5000/health && break
            echo "Waiting for API... ($i)"
            sleep 2
          done

      - name: Install K6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Run smoke test (every push)
        if: github.event_name != 'workflow_dispatch'
        run: |
          k6 run \
            --out influxdb=http://localhost:8086/k6 \
            -e BASE_URL=http://localhost:5000 \
            tests/performance/k6/scenarios/smoke.js

      - name: Run selected test (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          k6 run \
            --out influxdb=http://localhost:8086/k6 \
            -e BASE_URL=http://localhost:5000 \
            tests/performance/k6/scenarios/${{ github.event.inputs.test_type }}.js

      - name: Export results as JSON
        if: always()
        run: |
          mkdir -p test-results
          k6 run \
            --out json=test-results/k6-results.json \
            -e BASE_URL=http://localhost:5000 \
            tests/performance/k6/scenarios/smoke.js || true

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-results
          path: test-results/
          retention-days: 30