name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Start integration services
        run: |
          docker compose -f docker-compose.integration.yml up -d
          docker compose -f docker-compose.integration.yml ps

      - name: Wait for integration services
        run: |
          echo "Waiting for bank simulator API..."
          timeout 90 bash -c 'until curl -fsS http://localhost:8080 > /dev/null; do sleep 3; done'

          echo "Waiting for fraud simulator API..."
          timeout 90 bash -c 'until curl -fsS http://localhost:8086 > /dev/null; do sleep 3; done'

          echo "Waiting for RabbitMQ AMQP port..."
          timeout 90 bash -c 'until nc -z localhost 5672; do sleep 3; done'

      - name: Run tests
        env:
          ASPNETCORE_ENVIRONMENT: Development
          RabbitMq__HostName: localhost
          RabbitMq__Port: "5672"
          RabbitMq__UserName: guest
          RabbitMq__Password: guest
          RabbitMq__VirtualHost: /
          AcquiringBank__BaseUrl: http://localhost:8080
          FraudService__BaseUrl: http://localhost:8086
          Service__OpenTelemetry__OtlpEndpoint: http://localhost:4318
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.integration.yml logs

      - name: Stop integration services
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v